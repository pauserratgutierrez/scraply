name: Publish to NPM

on:
  push:
    tags:
      - 'v*'

# OIDC trusted publishing (no long-lived NPM_TOKEN needed for publish).
permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'

      # Trusted publishing requires npm CLI >= 11.5.1; upgrade to be safe across runner images.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish --access public
